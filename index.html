<body>
  <main class="shell">
    <canvas id="game" width="960" height="480" tabindex="0" aria-label="Gayatek hunter game"></canvas>
    <div class="hud">
      <button id="mute" type="button" title="Mute sound">Sound</button>
      <span id="status">Right-click to move. Left-click to shoot. Press C for chakram. Press V for 360 shot.</span>
    </div>
  </main>
  <div id="desktopGate" class="desktop-gate" hidden>
    <div class="desktop-gate__panel">
      <h1>Desktop Hunt Only</h1>
      <p>Hunter-Gayatek is built for mouse aiming, right-click movement, and keyboard abilities.</p>
      <p>Please open this game on a desktop or laptop computer.</p>
    </div>
  </div>
